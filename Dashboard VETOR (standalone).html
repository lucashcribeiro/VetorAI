document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px 10px 10px 4px; padding: 9px 13px; font-size: 13.5px; line-height: 1.5;\">Pode ser dia 12 às 9h?<\u002Fdiv>\n              <div style=\"align-self: flex-end; max-width: 85%; background: var(--carvao); color: var(--osso); border-radius: 10px 10px 4px 10px; padding: 9px 13px; font-size: 13.5px; line-height: 1.5;\">Marcado: sábado, 12 jul, 9h, com a Dra. Helena. Vou te lembrar na sexta.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background: var(--branco); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 22px 24px;\">\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 12px;\">O que ele não faz<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; color: var(--pedra); line-height: 1.5;\">\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não dá diagnóstico nem opinião clínica — isso é seu.<\u002Fdiv>\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não negocia preço de tratamentos complexos.<\u002Fdiv>\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não segura emergências: encaminha para a recepção na hora.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ════════════════════ TELA: ZELO (onboarding) ════════════════════ -->\n    <sc-if value=\"{{ telaZelo }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Zelo — onboarding\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--pedra); cursor: pointer; margin-bottom: 18px; display: inline-flex; align-items: center; gap: 6px;\" style-hover=\"color: #171717;\" onclick=\"{{ goInicio }}\">← voltar ao início<\u002Fdiv>\n      <header style=\"margin-bottom: 26px;\">\n        <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .04em; color: var(--pedra); margin-bottom: 8px;\">nova ferramenta · proposta<\u002Fdiv>\n        <h1 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(24px, 3vw, 30px); line-height: 1.15; margin: 0 0 8px;\">Zelo — pós-consulta<\u002Fh1>\n        <div style=\"font-size: 15px; color: var(--pedra); line-height: 1.6; max-width: 620px;\">Paciente que some depois do tratamento é receita perdida. O Zelo lembra retornos, pede avaliação no Google e reativa quem não volta há mais de 6 meses — sempre com mensagens que você aprovou antes.<\u002Fdiv>\n      <\u002Fheader>\n\n      <div style=\"display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 16px;\">\n        <div style=\"flex: 1.5 1 360px; min-width: 0; background: var(--branco); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px;\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 16px;\">Como entra no ar — 3 semanas<\u002Fdiv>\n\n          <div style=\"display: flex; gap: 14px; padding-bottom: 18px;\">\n            <div style=\"display: flex; flex-direction: column; align-items: center; flex: none;\">\n              <div style=\"width: 28px; height: 28px; border-radius: 50%; background: var(--carvao); color: var(--osso); display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px;\">1<\u002Fdiv>\n              <div style=\"width: 1.5px; flex: 1; background: var(--areia); margin-top: 6px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding-bottom: 2px;\">\n              <div style=\"font-weight: 600; font-size: 14.5px;\">Semana 1 — conectar<\u002Fdiv>\n              <div style=\"font-size: 13.5px; color: var(--pedra); line-height: 1.55; margin-top: 3px;\">O Rafael liga o Zelo à sua agenda (Dental Office) e ao WhatsApp que você já usa. Nada muda na rotina da recepção.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; gap: 14px; padding-bottom: 18px;\">\n            <div style=\"display: flex; flex-direction: column; align-items: center; flex: none;\">\n              <div style=\"width: 28px; height: 28px; border-radius: 50%; background: var(--carvao); color: var(--osso); display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px;\">2<\u002Fdiv>\n              <div style=\"width: 1.5px; flex: 1; background: var(--areia); margin-top: 6px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding-bottom: 2px;\">\n              <div style=\"font-weight: 600; font-size: 14.5px;\">Semana 2 — você aprova as mensagens<\u002Fdiv>\n              <div style=\"font-size: 13.5px; color: var(--pedra); line-height: 1.55; margin-top: 3px;\">Lembrete de retorno, pedido de avaliação e mensagem de reativação. Você lê, ajusta o tom e aprova — igual ao Conteúdo.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display: flex; gap: 14px;\">\n            <div style=\"flex: none;\">\n              <div style=\"width: 28px; height: 28px; border-radius: 50%; background: var(--vermelho-vetor); color: var(--branco); display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px;\">3<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight: 600; font-size: 14.5px;\">Semana 3 — no ar<\u002Fdiv>\n              <div style=\"font-size: 13.5px; color: var(--pedra); line-height: 1.55; margin-top: 3px;\">O Zelo começa pelos pacientes com retorno vencido. Você acompanha tudo por aqui, no mesmo painel.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex: 1 1 300px; min-width: 0; display: flex; flex-direction: column; gap: 16px;\">\n          <div style=\"background: var(--branco); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 22px 24px;\">\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 12px;\">O que ele não faz<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; color: var(--pedra); line-height: 1.5;\">\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não manda mensagem que você não aprovou.<\u002Fdiv>\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não insiste: no máximo 2 tentativas por paciente.<\u002Fdiv>\n              <div style=\"display: flex; gap: 9px;\"><span style=\"color: #B3261E; font-weight: 600; flex: none;\">✕<\u002Fspan>Não promete resultado clínico nem dá desconto sozinho.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background: var(--carvao); color: var(--osso); border-radius: 12px; padding: 24px;\">\n            <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: .6; margin-bottom: 10px;\">investimento<\u002Fdiv>\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 30px; line-height: 1;\">R$ 390/mês<\u002Fdiv>\n            <div style=\"font-size: 13.5px; opacity: .75; line-height: 1.6; margin-top: 8px;\">Sem fidelidade. Se em 60 dias o Zelo não trouxer de volta pelo menos 6 pacientes, o Rafael desliga e devolve o mês.<\u002Fdiv>\n            <div style=\"margin-top: 16px;\">\n              <x-import component-from-global-scope=\"VetorDesignSystem_cb8728.Button\" variant=\"primary\" size=\"md\" onclick=\"{{ interesseClick }}\" hint-size=\"150px,40px\">{{ interesseLabel }}<\u002Fx-import>\n            <\u002Fdiv>\n            <sc-if value=\"{{ interesseOk }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: .6; margin-top: 12px; line-height: 1.6;\">rafael@vetor.com.br · liga até amanhã, 18h<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size: 13px; color: var(--pedra); line-height: 1.6; max-width: 620px;\">Estimativa com base em clínicas parecidas com a sua: 8 a 12 pacientes recuperados por mês, cerca de R$ 4.900 em tratamentos de retorno.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;alertaAnuncios&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estados&quot; },\n  &quot;mostrarUpsell&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Estados&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    mobile: false,\n    tela: 'inicio',\n    tabConteudo: 'aprovar',\n    interesseEnviado: false,\n    anuncioPausado: false,\n    ajustesSalvos: false,\n    posts: [\n      { id: 1, titulo: 'Clareamento: mitos e verdades', legenda: 'Você sabia que o clareamento profissional não enfraquece o esmalte? Separamos as 3 dúvidas mais comuns dos nossos pacientes.', data: 'qui, 10 jul · 11h', tipo: 'carrossel · 5 telas', formato: 'imagem 1080×1350', status: 'aprovar' },\n      { id: 2, titulo: 'Antes e depois — lente de contato', legenda: 'Resultado da paciente M.S., com autorização. Tratamento concluído em 3 sessões.', data: 'sáb, 12 jul · 9h', tipo: 'foto única', formato: 'imagem 1080×1080', status: 'aprovar' },\n      { id: 3, titulo: 'Por que o retorno semestral importa', legenda: 'Roteiro de 40 segundos: o que a Dra. Helena encontra numa revisão que você não percebe em casa.', data: 'ter, 15 jul · 18h', tipo: 'reels · roteiro', formato: 'vídeo 1080×1920', status: 'aprovar' },\n      { id: 4, titulo: 'Conheça a Carla, da recepção', legenda: 'Quem te atende quando você chama a clínica. Post de bastidores para aproximar os pacientes.', data: 'qui, 17 jul · 11h', tipo: 'foto única', formato: 'imagem 1080×1080', status: 'aprovar' }\n    ],\n    agendadosBase: [\n      { id: 11, titulo: 'Dica: fio dental antes ou depois da escovação?', data: 'qua, 9 jul · 10h' },\n      { id: 12, titulo: 'Horário de julho — recesso dia 25', data: 'sex, 11 jul · 15h' }\n    ],\n    publicados: [\n      { id: 21, titulo: 'Primeira consulta: o que esperar', data: 'seg, 30 jun', metrica: '1.204 contas alcançadas' },\n      { id: 22, titulo: 'Sorriso da paciente Ana (autorizado)', data: 'sex, 27 jun', metrica: '2.860 contas alcançadas' },\n      { id: 23, titulo: 'Check-up digital gratuito', data: 'qua, 25 jun', metrica: '980 contas alcançadas' }\n    ],\n    convites: [],\n    emailConvite: '',\n    nomeClinica: 'Clínica Prado Odontologia',\n    telefone: '(11) 3456-7820',\n    endereco: 'R. das Acácias, 210 — Moema, São Paulo',\n    horario: 'seg a sex, 8h às 19h · sáb, 8h às 13h',\n    notifWhats: true,\n    notifEmail: true,\n    notifLigacao: false\n  };\n\n  componentDidMount() {\n    this.mq = window.matchMedia('(max-width: 920px)');\n    this.onMq = () => this.setState({ mobile: this.mq.matches });\n    this.mq.addEventListener('change', this.onMq);\n    this.onMq();\n  }\n\n  componentWillUnmount() {\n    if (this.mq) this.mq.removeEventListener('change', this.onMq);\n  }\n\n  navStyle(key) {\n    const on = this.state.tela === key;\n    return {\n      display: 'flex', alignItems: 'center', gap: 11, padding: '9px 12px',\n      borderRadius: 8, fontSize: 14, cursor: 'pointer',\n      background: on ? 'rgba(240,238,232,.1)' : 'transparent',\n      borderLeft: on ? '2px solid #E04A1F' : '2px solid transparent',\n      fontWeight: on ? 600 : 400, opacity: on ? 1 : .72\n    };\n  }\n\n  pillStyle(key) {\n    const on = this.state.tela === key;\n    return {\n      flex: 'none', padding: '6px 12px', borderRadius: 999, cursor: 'pointer',\n      background: on ? 'rgba(240,238,232,.12)' : 'transparent',\n      fontWeight: on ? 600 : 400, opacity: on ? 1 : .7\n    };\n  }\n\n  tabStyle(key) {\n    const on = this.state.tabConteudo === key;\n    return {\n      padding: '8px 14px', borderRadius: 8, fontSize: 13.5, cursor: 'pointer',\n      background: on ? '#171717' : 'transparent',\n      color: on ? '#F0EEE8' : '#7A756C',\n      fontWeight: on ? 600 : 500,\n      border: on ? '1px solid #171717' : '1px solid rgba(0,0,0,.12)'\n    };\n  }\n\n  toggleStyle(on) {\n    return {\n      width: 40, height: 22, borderRadius: 999, padding: 2, boxSizing: 'border-box',\n      display: 'flex', alignItems: 'center', flex: 'none',\n      justifyContent: on ? 'flex-end' : 'flex-start',\n      background: on ? '#171717' : '#C9C4B8', cursor: 'pointer', transition: 'background .15s'\n    };\n  }\n\n  setPost(id, status) {\n    this.setState(s => ({ posts: s.posts.map(p => p.id === id ? { ...p, status } : p) }));\n  }\n\n  go(key) { this.setState({ tela: key }); }\n\n  renderVals() {\n    const s = this.state;\n    const alerta = this.props.alertaAnuncios ?? false;\n    const pend = s.posts.filter(p => p.status === 'aprovar' || p.status === 'ajuste');\n    const nAprovar = s.posts.filter(p => p.status === 'aprovar').length;\n    const aprovadosAgora = s.posts.filter(p => p.status === 'agendado');\n    const agendados = aprovadosAgora\n      .map(p => ({ titulo: p.titulo, data: p.data, novo: true }))\n      .concat(s.agendadosBase.map(p => ({ titulo: p.titulo, data: p.data, novo: false })));\n\n    return {\n      mobile: s.mobile,\n      desktop: !s.mobile,\n      alerta: alerta,\n      semAlerta: !alerta,\n      upsell: this.props.mostrarUpsell ?? true,\n\n      telaInicio: s.tela === 'inicio',\n      telaConteudo: s.tela === 'conteudo',\n      telaAnuncios: s.tela === 'anuncios',\n      telaRelatorios: s.tela === 'relatorios',\n      telaEquipe: s.tela === 'equipe',\n      telaAjustes: s.tela === 'ajustes',\n      telaWhatsapp: s.tela === 'whatsapp',\n      telaZelo: s.tela === 'zelo',\n      goWhatsapp: () => this.go('whatsapp'),\n      goZelo: () => this.go('zelo'),\n      goInicio: () => this.go('inicio'),\n      goConteudo: () => this.go('conteudo'),\n      goAnuncios: () => this.go('anuncios'),\n      goRelatorios: () => this.go('relatorios'),\n      goEquipe: () => this.go('equipe'),\n      goAjustes: () => this.go('ajustes'),\n      nsInicio: this.navStyle('inicio'),\n      nsConteudo: this.navStyle('conteudo'),\n      nsAnuncios: this.navStyle('anuncios'),\n      nsRelatorios: this.navStyle('relatorios'),\n      nsEquipe: this.navStyle('equipe'),\n      nsAjustes: this.navStyle('ajustes'),\n      mpInicio: this.pillStyle('inicio'),\n      mpConteudo: this.pillStyle('conteudo'),\n      mpAnuncios: this.pillStyle('anuncios'),\n      mpRelatorios: this.pillStyle('relatorios'),\n      mpEquipe: this.pillStyle('equipe'),\n      mpAjustes: this.pillStyle('ajustes'),\n\n      pendAlgum: nAprovar > 0,\n      pendZero: nAprovar === 0,\n      pendNum: nAprovar === 1 ? '1 item' : nAprovar + ' itens',\n      pendVerbo: nAprovar === 1 ? 'aguarda sua aprovação' : 'aguardam sua aprovação',\n      pendBadgeTxt: nAprovar + ' p/ aprovar',\n      nPendStr: nAprovar > 0 ? String(nAprovar) : '',\n\n      tabAprovar: () => this.setState({ tabConteudo: 'aprovar' }),\n      tabAgendados: () => this.setState({ tabConteudo: 'agendados' }),\n      tabPublicados: () => this.setState({ tabConteudo: 'publicados' }),\n      tsAprovar: this.tabStyle('aprovar'),\n      tsAgendados: this.tabStyle('agendados'),\n      tsPublicados: this.tabStyle('publicados'),\n      abaAprovar: s.tabConteudo === 'aprovar',\n      abaAgendados: s.tabConteudo === 'agendados',\n      abaPublicados: s.tabConteudo === 'publicados',\n      labelAprovar: 'Para aprovar (' + nAprovar + ')',\n      labelAgendados: 'Agendados (' + agendados.length + ')',\n      filaVazia: pend.length === 0,\n      pendentes: pend.map(p => ({\n        ...p,\n        ehAprovar: p.status === 'aprovar',\n        ehAjuste: p.status === 'ajuste',\n        aprovar: () => this.setPost(p.id, 'agendado'),\n        ajustar: () => this.setPost(p.id, 'ajuste')\n      })),\n      agendados: agendados,\n      publicados: s.publicados,\n\n      pausarLabel: s.anuncioPausado ? 'Pausado' : 'Pausar',\n      pausarClick: () => this.setState({ anuncioPausado: true }),\n\n      interesseLabel: s.interesseEnviado ? 'Recebido' : 'Quero contratar',\n      interesseClick: () => this.setState({ interesseEnviado: true }),\n      interesseOk: s.interesseEnviado,\n\n      convites: s.convites,\n      emailConvite: s.emailConvite,\n      onEmailChange: (e) => this.setState({ emailConvite: e.target.value }),\n      enviarConvite: () => {\n        const email = s.emailConvite.trim();\n        if (!email) return;\n        this.setState(st => ({ convites: st.convites.concat([{ email: email }]), emailConvite: '' }));\n      },\n\n      nomeClinica: s.nomeClinica,\n      telefone: s.telefone,\n      endereco: s.endereco,\n      horario: s.horario,\n      onNomeChange: (e) => this.setState({ nomeClinica: e.target.value, ajustesSalvos: false }),\n      onTelefoneChange: (e) => this.setState({ telefone: e.target.value, ajustesSalvos: false }),\n      onEnderecoChange: (e) => this.setState({ endereco: e.target.value, ajustesSalvos: false }),\n      onHorarioChange: (e) => this.setState({ horario: e.target.value, ajustesSalvos: false }),\n      salvarLabel: s.ajustesSalvos ? 'Salvo' : 'Salvar alterações',\n      salvarAjustes: () => this.setState({ ajustesSalvos: true }),\n\n      tgWhats: this.toggleStyle(s.notifWhats),\n      tgEmail: this.toggleStyle(s.notifEmail),\n      tgLigacao: this.toggleStyle(s.notifLigacao),\n      toggleWhats: () => this.setState(st => ({ notifWhats: !st.notifWhats })),\n      toggleEmail: () => this.setState(st => ({ notifEmail: !st.notifEmail })),\n      toggleLigacao: () => this.setState(st => ({ notifLigacao: !st.notifLigacao }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
